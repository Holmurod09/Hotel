{% extends 'core/base.html' %}

{% block title %}Xizmatlar - Menga Hotel{% endblock %}

{% block content %}
<section class="pt-32 pb-24 bg-white dark:bg-secondary relative overflow-hidden">
    <div class="absolute top-0 right-0 w-96 h-96 bg-primary/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-0 left-0 w-96 h-96 bg-blue-500/10 rounded-full blur-3xl"></div>
    
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
        <div class="text-center mb-16">
            <h1 class="font-serif text-4xl md:text-5xl font-bold mb-4">Xizmatlarimiz</h1>
            <p class="text-gray-600 dark:text-gray-400">Mehmonxonamizda siz kutgan barcha qulayliklar</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            {% for service in services %}
            <div class="group p-8 rounded-2xl bg-gray-50 dark:bg-dark hover:bg-primary hover:text-white transition-all duration-300 transform hover:-translate-y-2">
                <div class="w-16 h-16 bg-primary/20 rounded-full flex items-center justify-center mb-6 group-hover:bg-white/20">
                    <i class="{{ service.icon }} text-2xl text-primary group-hover:text-white"></i>
                </div>
                <h3 class="text-xl font-bold mb-3">{{ service.title }}</h3>
                <p class="opacity-80">{{ service.description }}</p>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
{% endblock %}
