{% extends 'core/base.html' %}

{% block title %}Bron qilish - Menga Hotel{% endblock %}

{% block content %}
<section class="pt-32 pb-24 bg-gray-50 dark:bg-dark">
    <div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="bg-white dark:bg-secondary p-8 rounded-2xl shadow-xl">
            <h1 class="font-serif text-3xl font-bold mb-6 text-center">Xona bron qilish</h1>
            
            <form method="post" class="space-y-6">
                {% csrf_token %}
                
                {% for field in form %}
                <div>
                    <label class="block text-sm font-medium mb-2">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                    <p class="text-red-500 text-sm mt-1">{{ field.errors.0 }}</p>
                    {% endif %}
                </div>
                {% endfor %}

                <button type="submit" class="w-full bg-primary text-white py-4 rounded-lg font-semibold text-lg hover:bg-yellow-600 transition-all">
                    Yuborish
                </button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
